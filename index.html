<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shelter Food Service Tracker</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#eef2f5;
  display:flex;
  justify-content:center;
  padding:30px;
}

.container{
  width:1100px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#333;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  border:2px solid #333;
  height:55px;
  text-align:center;
}

th{
  color:white;
  font-weight:bold;
}

/* Section headers */

.section{
  font-size:20px;
  color:white;
}

.breakfast{
  background:#ffa726;
}

.lunch{
  background:#66bb6a;
}

.dinner{
  background:#5c6bc0;
}

/* Column colors */

.food{background:#546e7a;}
.date{background:#42a5f5;}
.time{background:#26a69a;}
.day{background:#ffb74d;}
.discard{background:#ef5350;}

.food-col{
  width:230px;
}

/* print friendly */

@media print{
  body{
    background:white;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>Shelter Food Service Tracker</h1>

<table>

<!-- BREAKFAST -->
<tr><th colspan="7" class="section breakfast">Breakfast</th></tr>

<tr>
<th class="food food-col">Food Item</th>
<th class="date">Date Served</th>
<th class="time">Time</th>
<th class="day">Day 1</th>
<th class="day">Day 2</th>
<th class="day">Day 3</th>
<th class="discard">Discard</th>
</tr>

<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>


<!-- LUNCH -->
<tr><th colspan="7" class="section lunch">Lunch</th></tr>

<tr>
<th class="food food-col">Food Item</th>
<th class="date">Date Served</th>
<th class="time">Time</th>
<th class="day">Day 1</th>
<th class="day">Day 2</th>
<th class="day">Day 3</th>
<th class="discard">Discard</th>
</tr>

<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>


<!-- DINNER -->
<tr><th colspan="7" class="section dinner">Dinner</th></tr>

<tr>
<th class="food food-col">Food Item</th>
<th class="date">Date Served</th>
<th class="time">Time</th>
<th class="day">Day 1</th>
<th class="day">Day 2</th>
<th class="day">Day 3</th>
<th class="discard">Discard</th>
</tr>

<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>

</table>

</div>

</body>
</html>
